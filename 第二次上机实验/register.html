<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蛋糕店 - 用户注册</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="#" class="logo">蛋糕店</a>
                <ul class="nav-menu">
                    <li><a href="#">首页</a></li>
                    <li class="dropdown">
                        <a href="#">商品分类 <span class="arrow">▼</span></a>
                        <ul class="dropdown-menu">
                            <li><a href="#">生日蛋糕</a></li>
                            <li><a href="#">婚礼蛋糕</a></li>
                            <li><a href="#">水果蛋糕</a></li>
                            <li><a href="#">巧克力蛋糕</a></li>
                        </ul>
                    </li>
                    <li><a href="#">热销</a></li>
                    <li><a href="#">新品</a></li>
                    <li><a href="#" class="active">注册</a></li>
                    <li><a href="#">登录</a></li>
                </ul>
            </div>
            <div class="nav-right">
                <a href="#" class="icon-btn" title="搜索">🔍</a>
                <a href="#" class="icon-btn cart" title="购物车">
                    🛒<span class="cart-count">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        <h1 class="page-title">注册新用户</h1>

        <form id="registerForm" action="#" method="post" class="register-form">
            <div class="form-group">
                <label for="username">用户名 <span class="required">*</span></label>
                <input type="text" id="username" name="username" value="itcast" required>
            </div>

            <div class="form-group">
                <label for="email">邮箱 <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="请输入邮箱" required>
            </div>

            <div class="form-group">
                <label for="password">密码 <span class="required">*</span></label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>

            <div class="form-group">
                <label for="receiver">收货人</label>
                <input type="text" id="receiver" name="receiver" placeholder="请输入收货">
            </div>

            <div class="form-group">
                <label for="phone">收货电话</label>
                <input type="text" id="phone" name="phone" placeholder="请输入收货电话">
            </div>

            <div class="form-group">
                <label for="address">收货地址</label>
                <input type="text" id="address" name="address" placeholder="请输入收货地址">
            </div>

            <div class="form-submit">
                <button type="submit" class="btn-submit">提交</button>
            </div>
        </form>
    </main>

    <script src="register.js"></script>
</body>
</html>
